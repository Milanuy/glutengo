<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlutenGo Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --green:#166534;--green-deep:#0E3D22;--green-light:#DCFCE7;
      --amber:#E8A93C;--red:#DC2626;--red-light:#FEE2E2;
      --gray:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;--white:#fff;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:#111;min-height:100vh}

    /* ── LOGIN ── */
    #login-screen{
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;padding:1.5rem;
    }
    .login-card{
      background:#fff;border-radius:20px;padding:2.5rem;
      box-shadow:0 4px 32px rgba(0,0,0,.1);
      width:100%;max-width:380px;text-align:center;
    }
    .login-logo{font-family:Georgia,serif;font-size:1.8rem;font-weight:900;color:var(--green-deep);margin-bottom:.25rem}
    .login-logo span{color:var(--amber)}
    .login-sub{font-size:.85rem;color:var(--gray);margin-bottom:2rem}
    .login-input{
      width:100%;border:1.5px solid var(--border);border-radius:10px;
      padding:.75rem 1rem;font-size:1rem;font-family:inherit;
      margin-bottom:1rem;transition:border-color .2s;
    }
    .login-input:focus{outline:none;border-color:var(--green)}
    .login-btn{
      width:100%;background:var(--green-deep);color:#fff;
      font-weight:700;font-size:1rem;padding:.85rem;
      border:none;border-radius:12px;cursor:pointer;
      font-family:inherit;transition:background .2s;
    }
    .login-btn:hover{background:var(--green)}
    .login-err{color:var(--red);font-size:.85rem;margin-top:.6rem;display:none}

    /* ── LAYOUT ── */
    #admin-app{display:none}
    .top-bar{
      background:var(--green-deep);color:#fff;
      padding:.85rem 1.5rem;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
    }
    .top-logo{font-family:Georgia,serif;font-size:1.3rem;font-weight:900}
    .top-logo span{color:var(--amber)}
    .top-right{display:flex;align-items:center;gap:1rem}
    .top-badge{background:rgba(255,255,255,.15);padding:.3rem .75rem;border-radius:20px;font-size:.78rem}
    .top-logout{
      background:rgba(220,38,38,.2);color:#FCA5A5;
      border:1px solid rgba(220,38,38,.3);padding:.3rem .75rem;
      border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit;
    }
    .main{max-width:1200px;margin:0 auto;padding:1.5rem}

    /* ── STATS ── */
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.75rem}
    .stat-card{
      background:#fff;border-radius:14px;padding:1.25rem 1.5rem;
      border:1px solid var(--border);
    }
    .stat-val{font-size:2rem;font-weight:900;line-height:1;margin-bottom:.2rem}
    .stat-lbl{font-size:.78rem;color:var(--gray)}

    /* ── FILTERS ── */
    .filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
    .filter-btn{
      padding:.45rem 1rem;border-radius:20px;font-size:.83rem;font-weight:700;
      border:1.5px solid var(--border);background:#fff;cursor:pointer;
      transition:all .15s;font-family:inherit;
    }
    .filter-btn.active{background:var(--green-deep);color:#fff;border-color:var(--green-deep)}
    .search-input{
      margin-left:auto;padding:.45rem .85rem;border:1.5px solid var(--border);
      border-radius:20px;font-size:.83rem;font-family:inherit;
      min-width:200px;
    }
    .search-input:focus{outline:none;border-color:var(--green)}

    /* ── TABLE ── */
    .table-wrap{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden}
    table{width:100%;border-collapse:collapse;font-size:.88rem}
    th{
      padding:.85rem 1rem;text-align:left;font-size:.75rem;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase;color:var(--gray);
      background:var(--bg);border-bottom:1px solid var(--border);
    }
    td{padding:.9rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#FAFAFA}

    /* ── BADGES ── */
    .badge{
      display:inline-flex;align-items:center;gap:.3rem;
      padding:.25rem .6rem;border-radius:20px;font-size:.73rem;font-weight:700;
    }
    .badge.pending{background:#FEF3C7;color:#92400E}
    .badge.pending_payment{background:#FEF3C7;color:#92400E}
    .badge.active{background:var(--green-light);color:var(--green)}
    .badge.rejected{background:var(--red-light);color:var(--red)}
    .badge.expired{background:#F3F4F6;color:#6B7280}
    .readiness-pill{
      display:inline-flex;align-items:center;justify-content:center;
      padding:.24rem .58rem;border-radius:999px;font-size:.72rem;font-weight:800;
      line-height:1.25;text-align:center;
    }
    .readiness-pill.ready{background:var(--green-light);color:var(--green)}
    .readiness-pill.warn{background:#FEF3C7;color:#92400E}
    .readiness-pill.missing{background:var(--red-light);color:var(--red)}
    .readiness-pill.published{background:#E0F2FE;color:#0369A1}

    .plan-pill{
      display:inline-block;padding:.2rem .55rem;
      border-radius:8px;font-size:.72rem;font-weight:700;
    }
    .plan-basico{background:#F3F4F6;color:#374151}
    .plan-verificado{background:#DBEAFE;color:#1D4ED8}
    .plan-certificado{background:rgba(232,169,60,.18);color:#92400E}

    /* ── ACTIONS ── */
    .actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
    .btn-sm{
      padding:.35rem .75rem;border-radius:8px;
      font-size:.78rem;font-weight:700;cursor:pointer;
      border:none;font-family:inherit;transition:background .15s;
    }
    .btn-approve{background:var(--green-light);color:var(--green)}
    .btn-approve:hover{background:#BBF7D0}
    .btn-reject{background:var(--red-light);color:var(--red)}
    .btn-reject:hover{background:#FECACA}
    .btn-expire{background:#F3F4F6;color:#374151}
    .btn-expire:hover{background:#E5E7EB}

    /* Position editor */
    .pos-wrap{display:flex;align-items:center;gap:.4rem}
    .pos-input{
      width:54px;padding:.3rem .5rem;border:1.5px solid var(--border);
      border-radius:8px;font-size:.83rem;font-family:inherit;text-align:center;
    }
    .pos-input:focus{outline:none;border-color:var(--green)}
    .btn-save-pos{
      padding:.3rem .6rem;background:var(--green);color:#fff;
      border:none;border-radius:8px;font-size:.75rem;font-weight:700;
      cursor:pointer;font-family:inherit;
    }
    .btn-save-pos:hover{background:var(--green-deep)}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:3rem 1rem;color:var(--gray)}

    /* ── TOAST ── */
    #toast{
      position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
      background:#111;color:#fff;padding:.7rem 1.2rem;
      border-radius:12px;font-size:.88rem;font-weight:600;
      opacity:0;transition:opacity .25s;pointer-events:none;
    }
    #toast.show{opacity:1}

    /* ── MODAL ── */
    .modal-overlay{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
      z-index:500;align-items:center;justify-content:center;padding:1rem;
    }
    .modal-overlay.show{display:flex}
    .modal{
      background:#fff;border-radius:20px;padding:2rem;max-width:760px;width:100%;
      max-height:90vh;overflow-y:auto;
    }
    .modal h3{font-size:1.1rem;font-weight:800;color:var(--green-deep);margin-bottom:.75rem}
    .modal p{font-size:.9rem;color:var(--gray);line-height:1.6;margin-bottom:.5rem}
    .modal-actions{display:flex;gap:.75rem;margin-top:1.25rem;justify-content:flex-end}
    .publish-note{
      border:1px solid #BBF7D0;background:#F0FDF4;color:#14532D;
      border-radius:12px;padding:.8rem .9rem;margin:.9rem 0 1rem;
      font-size:.84rem;line-height:1.5;
    }
    .publish-note strong{display:block;margin-bottom:.2rem;color:var(--green-deep)}
    .readiness-box{
      border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;
      background:#fff;margin:0 0 1rem;
    }
    .readiness-box.missing{border-color:#FECACA;background:#FEF2F2}
    .readiness-box.warn{border-color:#FDE68A;background:#FFFBEB}
    .readiness-box.ready{border-color:#BBF7D0;background:#F0FDF4}
    .readiness-head{display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:.55rem}
    .readiness-head strong{font-size:.88rem;color:var(--green-deep)}
    .readiness-list{display:grid;gap:.35rem;margin-top:.45rem}
    .readiness-item{font-size:.8rem;line-height:1.45;color:#374151}
    .readiness-item::before{content:'• ';font-weight:900;color:var(--amber)}
    .admin-preview{
      border:1px solid var(--border);border-radius:16px;padding:1rem;
      background:linear-gradient(180deg,#fff,#F9FAFB);box-shadow:0 8px 22px rgba(0,0,0,.04);
    }
    .preview-card{
      border:1px solid var(--border);border-radius:14px;background:#fff;
      padding:1rem;display:grid;gap:.55rem;
    }
    .preview-top{display:flex;align-items:flex-start;gap:.8rem}
    .preview-logo{
      width:48px;height:48px;border-radius:12px;background:var(--green-light);
      color:var(--green);display:flex;align-items:center;justify-content:center;
      font-weight:900;flex-shrink:0;overflow:hidden;
    }
    .preview-logo img{width:100%;height:100%;object-fit:cover}
    .preview-title{font-size:1rem;font-weight:900;color:#111;line-height:1.2}
    .preview-meta{font-size:.78rem;color:var(--gray);margin-top:.15rem}
    .preview-desc{font-size:.82rem;line-height:1.5;color:#374151}
    .preview-tags{display:flex;gap:.4rem;flex-wrap:wrap}
    .preview-tag{
      display:inline-flex;align-items:center;border-radius:999px;
      background:var(--green-light);color:var(--green);font-size:.7rem;font-weight:900;
      padding:.22rem .52rem;text-transform:uppercase;letter-spacing:.03em;
    }
    .preview-tag.warn{background:#FEF3C7;color:#92400E}
    .preview-links{display:flex;gap:.45rem;flex-wrap:wrap}
    .preview-link{
      background:#F3F4F6;color:#374151;border-radius:999px;padding:.28rem .58rem;
      font-size:.74rem;font-weight:800;
    }
    .modal-section-title{
      display:flex;align-items:center;gap:.5rem;
      font-size:.78rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;
      color:var(--green-deep);margin:1rem 0 .75rem;
    }
    .modal-section-title span{
      width:24px;height:24px;border-radius:50%;
      display:inline-flex;align-items:center;justify-content:center;
      background:var(--green-light);color:var(--green);font-size:.72rem;
    }
    .modal-field{margin-bottom:.85rem}
    .modal-field label{display:block;font-size:.82rem;font-weight:700;color:#374151;margin-bottom:.3rem}
    .modal-field input,.modal-field textarea,.modal-field select{
      width:100%;border:1.5px solid var(--border);border-radius:10px;
      padding:.65rem .9rem;font-size:.9rem;font-family:inherit;
    }
    .modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{
      outline:none;border-color:var(--green)
    }
    .modal-field textarea{min-height:70px;resize:vertical}
    .modal-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.85rem}
    .modal-grid .full{grid-column:1/-1}
    .check-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.55rem;margin-top:.45rem}
    .check-item{
      display:flex;align-items:flex-start;gap:.5rem;
      border:1px solid var(--border);border-radius:10px;padding:.65rem .75rem;
      font-size:.84rem;color:#374151;background:#fff;
    }
    .check-item input{margin-top:.15rem}
    .config-help{font-size:.78rem;color:var(--gray);line-height:1.45;margin-top:.35rem}
    .modal-divider{height:1px;background:var(--border);margin:1rem 0}

    @media(max-width:768px){
      .main{padding:1rem .75rem}
      .top-bar{align-items:flex-start;gap:.65rem;padding:.75rem 1rem}
      .top-right{gap:.5rem;flex-wrap:wrap;justify-content:flex-end}
      .top-badge{font-size:.72rem;padding:.25rem .55rem}
      .top-logout{font-size:.72rem;padding:.25rem .55rem}
      .stats{grid-template-columns:repeat(2,1fr)}
      .stat-card{padding:1rem}
      .stat-val{font-size:1.55rem}
      .filters{gap:.4rem}
      .filter-btn{font-size:.76rem;padding:.4rem .72rem}
      .search-input{width:100%;min-width:0;order:10;margin-left:0}
      .table-wrap{background:transparent;border:0;border-radius:0;overflow:visible}
      table,thead,tbody,tr,td{display:block;width:100%}
      table{font-size:.84rem;border-collapse:separate}
      thead{display:none}
      tbody{display:grid;gap:.85rem}
      tbody tr{
        background:#fff;border:1px solid var(--border);border-radius:14px;
        box-shadow:0 3px 14px rgba(0,0,0,.04);overflow:hidden;
      }
      tbody tr:hover td{background:transparent}
      td{
        display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;
        padding:.65rem .85rem;border-bottom:1px solid var(--border);
        text-align:right;
      }
      td::before{
        content:attr(data-label);
        flex:0 0 auto;
        color:var(--gray);
        font-size:.7rem;
        font-weight:800;
        letter-spacing:.06em;
        text-transform:uppercase;
        text-align:left;
      }
      td:first-child{
        display:block;text-align:left;background:var(--bg);
        padding:.85rem;
      }
      td:first-child::before{display:none}
      td:last-child{border-bottom:none;display:block;text-align:left}
      td:last-child::before{display:block;margin-bottom:.45rem}
      .actions{gap:.3rem}
      .actions .btn-sm{flex:1;min-width:82px}
      .btn-sm{padding:.42rem .55rem;font-size:.74rem}
      .plan-pill,.badge{max-width:165px;justify-content:center;text-align:center;line-height:1.25}
      .modal-grid,.check-grid{grid-template-columns:1fr}
      .modal{padding:1.25rem;border-radius:16px}
      .modal-actions{flex-direction:column}
      .modal-actions .btn-sm,.modal-actions a{width:100%;text-align:center}
    }
    @media(max-width:420px){
      .stats{grid-template-columns:1fr 1fr;gap:.65rem}
      .stat-lbl{font-size:.72rem}
      td{padding:.62rem .75rem}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Gluten<span>Go</span></div>
    <div class="login-sub">Panel de administración</div>
    <input type="password" id="pass-input" class="login-input" placeholder="Contraseña de admin" />
    <button class="login-btn" onclick="doLogin()">Entrar →</button>
    <div class="login-err" id="login-err">Contraseña incorrecta</div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="admin-app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-logo">Gluten<span>Go</span> <span style="font-size:.8rem;font-weight:400;opacity:.55;font-family:'DM Sans',sans-serif">Admin</span></div>
    <div class="top-right">
      <span class="top-badge" id="last-refresh">—</span>
      <button class="top-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="stats" id="stats-row">
      <div class="stat-card"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Total solicitudes</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#92400E" id="s-pending">—</div><div class="stat-lbl">Pendientes</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green)" id="s-active">—</div><div class="stat-lbl">Publicados</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--amber)" id="s-revenue">—</div><div class="stat-lbl">Ingresos estimados / mes</div></div>
    </div>

    <!-- FILTERS -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pendientes</button>
      <button class="filter-btn" onclick="setFilter('pending_payment',this)">Aguardando pago</button>
      <button class="filter-btn" onclick="setFilter('active',this)">Publicados</button>
      <button class="filter-btn" onclick="setFilter('rejected',this)">Rechazados</button>
      <button class="filter-btn" onclick="setFilter('expired',this)">Vencidos</button>
      <input type="search" class="search-input" placeholder="Buscar por nombre, barrio…" oninput="onSearch(this.value)" />
      <button class="filter-btn" style="margin-left:.25rem" onclick="loadBusinesses()">↻ Refrescar</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Local</th>
            <th>Plan</th>
            <th>Prioridad</th>
            <th>Estado</th>
            <th>Preparación</th>
            <th>Barrio</th>
            <th>Registro</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="biz-tbody">
          <tr><td colspan="8" class="empty">Cargando…</td></tr>
        </tbody>
      </table>
    </div>

  </div><!-- /main -->
</div><!-- /admin-app -->

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content">
    <!-- populated by JS -->
  </div>
</div>

<div id="toast"></div>

<script>
var API     = '/api/admin-businesses';
var adminToken = '';
var allBiz  = [];
var curFilter = 'todos';
var curSearch = '';

// ── LOGIN ──────────────────────────────────────────────────────────────────
function doLogin() {
  var pass = document.getElementById('pass-input').value;
  if (!pass) return;
  // Verificar contra el endpoint (el endpoint valida vs env var ADMIN_PASSWORD)
  fetch(API, { headers: { 'x-admin-token': pass } })
    .then(function(r) {
      if (r.status === 401) throw new Error('wrong');
      return r.json();
    })
    .then(function(data) {
      adminToken = pass;
      sessionStorage.setItem('gg_admin', pass);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-app').style.display = 'block';
      processData(data);
    })
    .catch(function(err) {
      document.getElementById('login-err').style.display = 'block';
    });
}

function logout() {
  sessionStorage.removeItem('gg_admin');
  location.reload();
}

document.getElementById('pass-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// Auto-login si hay sesión guardada
var savedPass = sessionStorage.getItem('gg_admin');
if (savedPass) {
  document.getElementById('pass-input').value = savedPass;
  doLogin();
}

// ── LOAD DATA ──────────────────────────────────────────────────────────────
function loadBusinesses() {
  document.getElementById('biz-tbody').innerHTML =
    '<tr><td colspan="8" class="empty">Cargando…</td></tr>';
  fetch(API, { headers: { 'x-admin-token': adminToken } })
    .then(function(r) { return r.json(); })
    .then(function(data) { processData(data); })
    .catch(function(err) { showToast('Error al cargar: ' + err.message); });
}

function processData(data) {
  allBiz = Array.isArray(data) ? data : [];
  document.getElementById('last-refresh').textContent =
    'Actualizado ' + new Date().toLocaleTimeString('es-UY');
  updateStats();
  renderTable();
}

function updateStats() {
  var pending  = allBiz.filter(function(b){ return b.status === 'pending' || b.status === 'pending_payment'; }).length;
  var active   = allBiz.filter(function(b){ return b.status === 'active'; }).length;
  var revenue  = allBiz
    .filter(function(b){ return b.status === 'active'; })
    .reduce(function(sum, b) {
      return sum + (b.plan === 'certificado' ? 1590 : b.plan === 'verificado' ? 590 : 0);
    }, 0);
  document.getElementById('s-total').textContent   = allBiz.length;
  document.getElementById('s-pending').textContent  = pending;
  document.getElementById('s-active').textContent   = active;
  document.getElementById('s-revenue').textContent  = revenue ? '$' + revenue.toLocaleString('es-UY') : '$0';
}

// ── FILTERS ────────────────────────────────────────────────────────────────
function setFilter(filter, btn) {
  curFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderTable();
}

function onSearch(val) {
  curSearch = val.toLowerCase().trim();
  renderTable();
}

// ── RENDER TABLE ───────────────────────────────────────────────────────────
var STATUS_LABELS = {
  pending: 'Pendiente', pending_payment: 'Aguardando pago',
  active: 'Publicado', rejected: 'Rechazado', expired: 'Vencido',
};
var PLAN_LABELS_ES = { basico: 'Básico', verificado: 'Verificado · datos confirmados', certificado: 'Certificado · protocolo SG' };
var CATEGORY_LABELS_ES = {
  restaurante: 'Restaurante',
  cafeteria: 'Cafetería',
  panaderia: 'Panadería',
  heladeria: 'Heladería',
  rotiseria: 'Rotisería / para llevar',
  almacen: 'Almacén / dietética',
  hotel: 'Hotel',
  otro: 'Otro',
};

function esc(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch) {
    return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[ch];
  });
}

function slugify(value) {
  return String(value || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase().replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 80);
}

function sameId(a, b) {
  return String(a) === String(b);
}

function defaultConfig(b) {
  var paid = b.plan === 'verificado' || b.plan === 'certificado';
  return {
    slug: slugify(b.nombre),
    category: b.categoria || 'restaurante',
    position: Number(b.position || 999),
    description: '',
    lat: '',
    lng: '',
    instagram: '',
    logoUrl: '',
    photoUrls: '',
    featuredPlacement: 'none',
    internal: '',
    benefits: {
      verifiedBadge: paid,
      certifiedBadge: b.plan === 'certificado',
      directContact: paid,
      logo: paid,
      priority: paid,
      homeFeature: false,
      sideBanner: false,
      megaBanner: false
    }
  };
}

function readConfig(b) {
  var cfg = defaultConfig(b || {});
  var rawNotes = b && (b.admin_notes || b.mensaje);
  if (!b || !rawNotes) return cfg;
  try {
    var parsed = JSON.parse(rawNotes);
    if (parsed && typeof parsed === 'object') {
      Object.assign(cfg, parsed);
      cfg.benefits = Object.assign(defaultConfig(b).benefits, parsed.benefits || {});
      return cfg;
    }
  } catch (_) {}
  cfg.internal = rawNotes;
  return cfg;
}

function hasText(value) {
  return String(value == null ? '' : value).trim().length > 0;
}

function hasCoords(cfg) {
  var lat = Number(String(cfg.lat || '').replace(',', '.'));
  var lng = Number(String(cfg.lng || '').replace(',', '.'));
  return Number.isFinite(lat) && Number.isFinite(lng);
}

function getReadiness(b, cfg) {
  var missing = [];
  var warnings = [];
  var benefits = cfg.benefits || {};
  var plan = b.plan || 'basico';

  if (!hasText(b.nombre)) missing.push('Nombre público');
  if (!hasText(b.tipo)) missing.push('Tipo de oferta');
  if (!hasText(cfg.category)) missing.push('Categoría');
  if (!hasText(b.direccion)) missing.push('Dirección');
  if (!hasText(b.barrio)) missing.push('Barrio o ciudad');
  if (!hasText(cfg.slug)) missing.push('Slug público');

  if (!hasText(cfg.description)) warnings.push('Falta descripción pública; se usará un texto automático.');
  if (!hasCoords(cfg)) warnings.push('Sin coordenadas: aparece en directorio y ficha, pero no en el mapa.');
  if (benefits.directContact && !hasText(b.telefono) && !hasText(cfg.instagram)) {
    missing.push('Contacto directo habilitado, pero falta WhatsApp o Instagram');
  }
  if (benefits.logo && !hasText(cfg.logoUrl)) warnings.push('Logo habilitado, pero falta URL de logo.');
  if (plan !== 'certificado' && benefits.certifiedBadge) warnings.push('Insignia de protocolo marcada sin plan Certificado.');
  if (plan === 'basico' && (benefits.directContact || benefits.logo || benefits.priority || cfg.featuredPlacement !== 'none')) {
    warnings.push('Plan Básico con beneficios pagos marcados.');
  }
  if ((plan === 'verificado' || plan === 'certificado') && b.status === 'pending_payment') {
    warnings.push('Confirmá el pago antes de publicar.');
  }

  if (b.status === 'active') return { tone: 'published', label: 'Publicado', missing: missing, warnings: warnings };
  if (missing.length) return { tone: 'missing', label: 'Faltan datos', missing: missing, warnings: warnings };
  if (warnings.length) return { tone: 'warn', label: 'Publicable con avisos', missing: missing, warnings: warnings };
  return { tone: 'ready', label: 'Listo para publicar', missing: missing, warnings: warnings };
}

function readinessPillHtml(readiness) {
  return '<span class="readiness-pill ' + esc(readiness.tone) + '">' + esc(readiness.label) + '</span>';
}

function readinessPanelHtml(readiness) {
  var items = [];
  readiness.missing.forEach(function(item) { items.push('Falta: ' + item); });
  readiness.warnings.forEach(function(item) { items.push(item); });
  var title = readiness.tone === 'published' ? 'Publicado en GlutenGo'
    : readiness.tone === 'ready' ? 'Listo para publicar'
    : readiness.tone === 'warn' ? 'Se puede publicar, revisando avisos'
    : 'Antes de publicar';
  var body = items.length
    ? '<div class="readiness-list">' + items.map(function(item) {
        return '<div class="readiness-item">' + esc(item) + '</div>';
      }).join('') + '</div>'
    : '<div class="readiness-item">La ficha tiene los datos mínimos para publicarse.</div>';
  return '<div class="readiness-box ' + esc(readiness.tone === 'published' ? 'ready' : readiness.tone) + '">' +
    '<div class="readiness-head"><strong>' + esc(title) + '</strong>' + readinessPillHtml(readiness) + '</div>' +
    body +
  '</div>';
}

function planLabel(plan) {
  return PLAN_LABELS_ES[plan] || plan || 'Básico';
}

function previewHtml(b, cfg) {
  var benefits = cfg.benefits || {};
  var isExclusive = b.tipo === 'exclusivo';
  var contactItems = [];
  if (benefits.directContact && hasText(b.telefono)) contactItems.push('WhatsApp visible');
  if (benefits.directContact && hasText(cfg.instagram)) contactItems.push('Instagram visible');
  if (!contactItems.length) contactItems.push('Sin contacto directo');
  var logo = benefits.logo && hasText(cfg.logoUrl)
    ? '<img src="' + esc(cfg.logoUrl) + '" alt="">'
    : esc((b.nombre || 'G').trim().charAt(0).toUpperCase() || 'G');
  return '<div class="preview-card">' +
    '<div class="preview-top">' +
      '<div class="preview-logo">' + logo + '</div>' +
      '<div>' +
        '<div class="preview-title">' + esc(b.nombre || 'Nombre del local') + '</div>' +
        '<div class="preview-meta">' + esc(CATEGORY_LABELS_ES[cfg.category] || cfg.category || 'Categoría') + ' · ' + esc(b.barrio || 'Zona a confirmar') + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="preview-tags">' +
      '<span class="preview-tag' + (isExclusive ? '' : ' warn') + '">' + (isExclusive ? '100% sin gluten' : 'Con opciones SG') + '</span>' +
      '<span class="preview-tag">' + esc(planLabel(b.plan)) + '</span>' +
      (hasCoords(cfg) ? '<span class="preview-tag">Con mapa</span>' : '<span class="preview-tag warn">Sin mapa</span>') +
    '</div>' +
    '<div class="preview-desc">' + esc(cfg.description || 'Si no cargás descripción, GlutenGo mostrará un texto automático y más genérico.') + '</div>' +
    '<div class="preview-links">' + contactItems.map(function(item) {

    }).join('') + '</div>' +

function refreshConfigPreview() {
  var state = collectModalState();
  var readiness = getReadiness(state.b, state.cfg);

  var previewEl = document.getElementById('admin-preview');
  if (readinessEl) readinessEl.innerHTML = readinessPanelHtml(readiness);

function bindConfigPreview() {
  var ids = [
    'cfg-status','cfg-plan','cfg-position','cfg-name','cfg-tipo','cfg-category','cfg-phone',
    'cfg-address','cfg-neighborhood','cfg-slug','cfg-description','cfg-lat','cfg-lng',
    'cfg-instagram','cfg-logo','cfg-photos','cfg-featured','cfg-internal',
    'benefit-verifiedBadge','benefit-certifiedBadge','benefit-directContact','benefit-logo',
    'benefit-priority','benefit-homeFeature','benefit-sideBanner','benefit-megaBanner'
  ];
  ids.forEach(function(id) {
    var el = document.getElementById(id);
    if (el) {
      el.addEventListener('input', refreshConfigPreview);
      el.addEventListener('change', refreshConfigPreview);
    }
  });

  var plan = document.getElementById('cfg-plan').value;
  var paid = plan === 'verificado' || plan === 'certificado';
  document.getElementById('benefit-verifiedBadge').checked = paid;
  document.getElementById('benefit-certifiedBadge').checked = plan === 'certificado';
  document.getElementById('benefit-directContact').checked = paid;
  document.getElementById('benefit-logo').checked = paid;
  document.getElementById('benefit-priority').checked = paid;
  if (!paid) {
    document.getElementById('benefit-homeFeature').checked = false;
    document.getElementById('benefit-sideBanner').checked = false;
    document.getElementById('benefit-megaBanner').checked = false;

function renderTable() {
  var filtered = allBiz.filter(function(b) {
    if (curFilter !== 'todos' && b.status !== curFilter) return false;
    if (curSearch) {
      var cfg = readConfig(b);
      var hay = ((b.nombre || '') + ' ' + (b.barrio || '') + ' ' + (b.email || '') + ' ' + (cfg.category || '')).toLowerCase();
      if (hay.indexOf(curSearch) === -1) return false;
    }
    return true;
  });

  var tbody = document.getElementById('biz-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">No hay negocios que coincidan.</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(b) {
    var cfg = readConfig(b);
    var readiness = getReadiness(b, cfg);
    var statusBadge = '<span class="badge ' + (b.status || 'pending') + '">' +
      esc(STATUS_LABELS[b.status] || b.status || 'Pendiente') + '</span>';
    var planPill = '<span class="plan-pill plan-' + (b.plan || 'basico') + '">' +
      esc(PLAN_LABELS_ES[b.plan] || b.plan || 'Básico') + '</span>';
    var fecha = b.created_at ? b.created_at.slice(0, 10) : '—';
    var actions = buildActions(b);

    return '<tr>' +
      '<td data-label="Local"><strong style="cursor:pointer;color:var(--green-deep)" onclick="showDetail(\'' + b.id + '\')">' + esc(b.nombre || '—') + '</strong>' +
        (b.email ? '<br><span style="font-size:.75rem;color:var(--gray)">' + esc(b.email) + '</span>' : '') +
        '<br><span style="font-size:.72rem;color:var(--gray)">' + esc(CATEGORY_LABELS_ES[cfg.category] || cfg.category || 'Sin categoría') + '</span>' +
      '</td>' +
      '<td data-label="Plan">' + planPill + '</td>' +
      '<td data-label="Prioridad" style="font-weight:800;color:var(--green-deep)">' + esc(cfg.position || 999) + '</td>' +
      '<td data-label="Estado">' + statusBadge + '</td>' +
      '<td data-label="Preparación">' + readinessPillHtml(readiness) + '</td>' +
      '<td data-label="Barrio" style="color:var(--gray);font-size:.83rem">' + esc(b.barrio || '—') + '</td>' +
      '<td data-label="Registro" style="color:var(--gray);font-size:.8rem">' + fecha + '</td>' +
      '<td data-label="Acciones">' + actions + '</td>' +
    '</tr>';
  }).join('');
}

function buildActions(b) {
  var btns = '';
  if (b.status === 'pending' || b.status === 'pending_payment') {
    btns += '<button class="btn-sm btn-approve" onclick="showDetail(\'' + b.id + '\')">Configurar</button>';
    btns += '<button class="btn-sm btn-reject" onclick="reject(\'' + b.id + '\')">Rechazar</button>';
  } else if (b.status === 'active') {
    btns += '<button class="btn-sm btn-approve" onclick="showDetail(\'' + b.id + '\')">Editar</button>';
    btns += '<button class="btn-sm btn-expire" onclick="expire(\'' + b.id + '\')">Suspender</button>';
  } else if (b.status === 'rejected' || b.status === 'expired') {
    btns += '<button class="btn-sm btn-approve" onclick="showDetail(\'' + b.id + '\')">Revisar</button>';
  }
  return '<div class="actions">' + btns + '</div>';
}

// ── PATCH HELPER ───────────────────────────────────────────────────────────
function patch(id, fields, successMsg) {
  return fetch(API, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
    body: JSON.stringify(Object.assign({ id: id }, fields)),
  })
  .then(function(r) {
    if (!r.ok) throw new Error('Error ' + r.status);
    return r.json();
  })
  .then(function(updated) {
    // Actualizar en allBiz local
    var idx = allBiz.findIndex(function(b) { return sameId(b.id, id); });
    if (idx !== -1) allBiz[idx] = Object.assign(allBiz[idx], updated, fields);
    updateStats();
    renderTable();
    showToast(successMsg || 'Guardado ✓');
    return true;
  })
  .catch(function(err) { showToast('Error: ' + err.message); return false; });
}

function approve(id) { patch(id, { status: 'active' }, 'Negocio publicado en GlutenGo'); }
function reject(id)  { patch(id, { status: 'rejected' }, '🚫 Negocio rechazado'); }
function expire(id)  { patch(id, { status: 'expired' }, 'Negocio suspendido'); }

    </div>

    <div class="modal-section-title"><span>4</span> Vista previa y publicación</div>
    <div class="admin-preview" id="admin-preview">${previewHtml(b, cfg)}</div>
    <div class="config-help">Esta vista previa resume lo que verá el usuario. Para publicar, usá el botón final; si faltan coordenadas, el local no tendrá pin en el mapa.</div>

    <div class="modal-actions">
      <button class="btn-sm" style="background:#F3F4F6;color:#374151" onclick="closeModal()">Cerrar</button>
      ${b.email ? `<a href="mailto:${esc(b.email)}" class="btn-sm" style="background:#F3F4F6;color:#374151;text-decoration:none">Email</a>` : ''}
      <button class="btn-sm btn-approve" onclick="saveConfig('${esc(b.id)}', false)">Guardar configuración</button>
      <button class="btn-sm btn-approve" onclick="saveConfig('${esc(b.id)}', true)">Guardar y publicar</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('show');
  bindConfigPreview();
  refreshConfigPreview();
}

function saveConfig(id, activate) {
  var state = collectModalState();
  var cfg = state.cfg;
  var modalBiz = state.b;
  if (!cfg.slug) {
    cfg.slug = slugify(modalBiz.nombre);
    document.getElementById('cfg-slug').value = cfg.slug;
  }
  var readiness = getReadiness(Object.assign({}, modalBiz, { status: activate ? 'pending' : modalBiz.status }), cfg);
  if (activate && readiness.missing.length) {
    refreshConfigPreview();
    showToast('Faltan datos antes de publicar');
    return;
  }
  var fields = {
    nombre: modalBiz.nombre,
    tipo: modalBiz.tipo,
    direccion: modalBiz.direccion,
    barrio: modalBiz.barrio,
    telefono: modalBiz.telefono,
    status: activate ? 'active' : modalBiz.status,
    plan: modalBiz.plan,
    mensaje: JSON.stringify(cfg)
  };
  patch(id, fields, activate ? 'Configuración guardada y local publicado' : 'Configuración guardada')
    .then(function(ok){ if (ok) closeModal(); });
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}

// Auto-refresh cada 60 seg cuando hay sesión activa
setInterval(function() {
  if (adminToken) loadBusinesses();
}, 60000);
</script>

</body>
</html>
