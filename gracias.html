<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>¡Estás en la lista! — GlutenGo</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#166534">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#0E3D22;color:#fff;display:flex;min-height:100vh;align-items:center;justify-content:center;text-align:center;padding:20px;overflow:hidden}
  .blob{position:fixed;border-radius:52% 48% 61% 39%/55% 46% 54% 45%;background:rgba(232,169,60,.16);width:380px;height:380px;top:-130px;right:-120px;animation:drift 14s ease-in-out infinite alternate}
  @keyframes drift{from{transform:translate(0,0)}to{transform:translate(20px,16px) rotate(8deg)}}
  .box{max-width:460px;position:relative;animation:pop .5s ease both}
  @keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .emoji{font-size:64px}
  h1{font-family:'Fraunces',serif;font-weight:900;font-size:42px;letter-spacing:-.02em;margin-top:14px}
  p{margin-top:14px;color:#BBD8C2;font-size:16px}
  a{display:inline-block;margin-top:30px;background:#E8A93C;color:#22201B;font-weight:800;text-decoration:none;padding:15px 30px;border-radius:14px;transition:transform .2s}
  a:hover{transform:translateY(-3px)}
</style>
</head>
<body>
<div class="blob"></div>
<div class="box">
  <div class="emoji">🎉</div>
  <h1>¡Estás en la lista!</h1>
  <p>Te vamos a escribir cuando la beta de GlutenGo esté lista. Gracias por sumarte a construir el mapa de confianza sin gluten de Uruguay.</p>
  <a href="/">Volver al directorio</a>
</div>
</body>
</html>
