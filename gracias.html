<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrá con Google — GlutenGo</title>
  <meta name="robots" content="noindex" />
  <meta http-equiv="refresh" content="0; url=/#cuenta" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#166534" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root{--green-deep:#0E3D22;--amber:#E8A93C}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--green-deep);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center}
    .card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:2.5rem;max-width:460px;width:100%}
    h1{font-family:'Fraunces',Georgia,serif;font-size:2rem;font-weight:900;margin-bottom:.75rem}
    p{opacity:.8;line-height:1.6;margin-bottom:1.25rem}
    a{display:inline-block;background:var(--amber);color:var(--green-deep);font-weight:700;padding:.8rem 1.75rem;border-radius:12px;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h1>Entrá con Google</h1>
    <p>El registro por email fue reemplazado por inicio de sesión con Google.</p>
    <a href="/#cuenta">Ir a GlutenGo</a>
  </div>
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
  </script>
</body>
</html>
