<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Lugar — GlutenGo</title>
  <meta name="description" id="page-desc" content="Ficha de establecimiento en GlutenGo">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#166534">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase JS (para auth) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <style>
    :root {
      --cream: #FAF5EC;
      --green: #166534;
      --green-deep: #0E3D22;
      --green-light: #DCFCE7;
      --terra: #C4654A;
      --amber: #E8A93C;
      --gray: #6B7280;
      --gray-light: #F3F4F6;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:#1a1a1a;min-height:100vh}

    /* HEADER */
    .site-header{
      position:sticky;top:0;z-index:200;
      background:var(--green-deep);
      padding:.9rem 1.25rem;
      display:flex;align-items:center;gap:1rem;
    }
    .back-btn{
      display:flex;align-items:center;gap:.4rem;
      color:#fff;text-decoration:none;font-size:.9rem;
      opacity:.85;transition:opacity .2s;
    }
    .back-btn:hover{opacity:1}
    .back-btn svg{width:18px;height:18px}
    .logo-sm{
      margin-left:auto;
      font-family:'Fraunces',Georgia,serif;
      font-size:1.15rem;color:#fff;font-weight:900;
      text-decoration:none;letter-spacing:-.01em;
    }
    .logo-sm span{color:var(--amber)}

    /* HERO DEL LUGAR */
    .lugar-hero{
      background:var(--green-deep);
      color:#fff;
      padding:2rem 1.25rem 2.5rem;
    }
    .place-logo{
      width:76px;height:76px;border-radius:18px;
      display:flex;align-items:center;justify-content:center;
      background:#fff;border:1px solid rgba(255,255,255,.32);
      box-shadow:0 8px 24px rgba(0,0,0,.18);
      overflow:hidden;margin-bottom:1rem;
    }
    .place-logo img{width:100%;height:100%;object-fit:contain;padding:8px}
    .tipo-badge{
      display:inline-flex;align-items:center;gap:.4rem;
      font-size:.75rem;font-weight:700;letter-spacing:.06em;
      text-transform:uppercase;
      padding:.25rem .65rem;border-radius:20px;
      margin-bottom:.75rem;
    }
    .tipo-badge.exclusivo{background:var(--green);color:#fff}
    .tipo-badge.mixto{background:var(--amber);color:#1a1a1a}
    h1.lugar-name{
      font-family:'Fraunces',Georgia,serif;
      font-size:clamp(1.6rem,5vw,2.4rem);
      font-weight:900;line-height:1.1;
      margin-bottom:.5rem;
    }
    .lugar-meta{
      display:flex;flex-wrap:wrap;gap:.5rem 1.25rem;
      margin-top:.75rem;opacity:.85;font-size:.9rem;
    }
    .lugar-meta span{display:flex;align-items:center;gap:.3rem}
    .lugar-category-icon{display:inline-flex;align-items:center;color:currentColor}
    .lugar-category-icon svg{width:15px;height:15px}
    .source-alert{
      margin-top:1rem;max-width:760px;
      background:rgba(255,255,255,.1);
      border:1px solid rgba(255,255,255,.18);
      color:rgba(255,255,255,.82);
      border-radius:12px;padding:.75rem .9rem;
      font-size:.82rem;line-height:1.5;
    }
    .source-alert strong{color:#fff}

    /* SCORE */
    .score-card{
      margin:1.5rem 1.25rem;
      background:#fff;border-radius:var(--radius);
      padding:1.25rem 1.5rem;
      box-shadow:var(--shadow);
      display:flex;align-items:center;gap:1.25rem;
    }
    .score-ring{
      position:relative;width:72px;height:72px;flex-shrink:0;
    }
    .score-ring svg{transform:rotate(-90deg)}
    .score-ring circle{transition:stroke-dashoffset .8s ease}
    .score-number{
      position:absolute;inset:0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      font-weight:900;font-size:1.25rem;line-height:1;
    }
    .score-number .score-label{font-size:.5rem;font-weight:600;text-transform:uppercase;opacity:.6;margin-top:.1rem}
    .score-info h3{font-size:1rem;font-weight:700;margin-bottom:.2rem}
    .score-info p{font-size:.82rem;color:var(--gray)}
    .score-band-pill{
      display:inline-block;
      padding:.2rem .6rem;border-radius:20px;
      font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
      margin-top:.4rem;
    }
    .band-construcion{background:#f0f0f0;color:#888}
    .band-come-tranquilo{background:#DCFCE7;color:#166534}
    .band-muy-recomendado{background:#D1FAE5;color:#065F46}
    .band-consulta-antes{background:#FEF3C7;color:#92400E}
    .band-requiere-validacion{background:#FEE2E2;color:#991B1B}

    /* CUERPO */
    .lugar-body{padding:0 1.25rem 3rem}

    /* CARD GENÉRICA */
    .card{
      background:#fff;border-radius:var(--radius);
      padding:1.25rem 1.5rem;box-shadow:var(--shadow);
      margin-bottom:1rem;
    }
    .card h2{
      font-size:.75rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;color:var(--green);
      margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;
    }

    /* DESCRIPCIÓN */
    .desc-text{font-size:.95rem;line-height:1.65;color:#374151}

    /* HORARIOS */
    .hours-grid{display:grid;gap:.35rem}
    .hour-row{
      display:flex;justify-content:space-between;
      font-size:.88rem;padding:.3rem 0;
      border-bottom:1px solid var(--gray-light);
    }
    .hour-row:last-child{border-bottom:none}
    .hour-row .day{font-weight:600}
    .hour-row .time{color:var(--gray)}
    .hour-closed{color:#EF4444;font-style:italic}

    /* CONTACTO */
    .contact-links{display:flex;flex-direction:column;gap:.6rem}
    .contact-link{
      display:flex;align-items:center;gap:.75rem;
      color:var(--green-deep);text-decoration:none;
      font-size:.9rem;font-weight:500;
      padding:.5rem .75rem;border-radius:8px;
      background:var(--gray-light);
      transition:background .15s;
    }
    .contact-link:hover{background:var(--green-light)}
    .contact-link svg{width:18px;height:18px;color:var(--green)}

    /* MAPA MINI */
    #mini-map{
      height:220px;border-radius:var(--radius);
      overflow:hidden;margin-bottom:.75rem;
    }
    .how-to-get{
      font-size:.85rem;color:var(--gray);
      display:flex;align-items:center;gap:.4rem;
      cursor:pointer;
    }
    .how-to-get:hover{color:var(--green)}

    /* CTA — REGISTRAR VISITA */
    .cta-visit{
      background:var(--green);color:#fff;
      border:none;border-radius:var(--radius);
      padding:1rem 1.5rem;width:100%;
      font-size:1rem;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:.5rem;
      margin-bottom:.75rem;transition:background .2s;
    }
    .cta-visit:hover{background:var(--green-deep)}
    .cta-visit-note{font-size:.75rem;color:var(--gray);text-align:center}

    /* SHARE */
    .share-row{
      display:flex;gap:.75rem;margin-top:.75rem;
    }
    .share-btn{
      flex:1;display:flex;align-items:center;justify-content:center;gap:.4rem;
      padding:.65rem;border-radius:8px;border:1.5px solid #E5E7EB;
      background:#fff;cursor:pointer;font-size:.85rem;font-weight:600;
      color:#374151;transition:border-color .15s;
    }
    .share-btn:hover{border-color:var(--green);color:var(--green)}

    /* RATING PANEL */
    .rating-panel{
      background:#fff;border-radius:var(--radius);
      padding:1.5rem;box-shadow:var(--shadow);
      margin-bottom:1rem;
    }
    .rating-panel h2{
      font-size:.75rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;color:var(--green);
      margin-bottom:1rem;display:flex;align-items:center;gap:.4rem;
    }

    /* Stars */
    .star-group{display:flex;gap:.5rem;margin-bottom:1rem;justify-content:center}
    .star-btn{
      font-size:2.25rem;background:none;border:none;cursor:pointer;
      filter:grayscale(1);opacity:.4;transition:filter .15s,opacity .15s,transform .1s;
      padding:.1rem;line-height:1;
    }
    .star-btn.selected,.star-btn.hovered{filter:none;opacity:1}
    .star-btn:hover{transform:scale(1.15)}
    .star-label{text-align:center;font-size:.85rem;color:var(--gray);min-height:1.2em;margin-bottom:.75rem}

    /* Textarea comentario */
    .rating-comment{
      width:100%;border:1.5px solid var(--border,#E5E7EB);border-radius:10px;
      padding:.65rem .85rem;font-size:.9rem;font-family:inherit;
      resize:vertical;min-height:70px;
      transition:border-color .2s;
    }
    .rating-comment:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(22,101,52,.1)}
    .rating-photo-row{display:flex;align-items:center;gap:.75rem;margin-top:.75rem;flex-wrap:wrap}
    .rating-photo-input{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px}
    .rating-photo-btn{
      display:inline-flex;align-items:center;justify-content:center;gap:.45rem;
      border:1.5px dashed #CBD5E1;background:#FFFBEB;color:var(--green-deep);
      border-radius:11px;padding:.65rem .85rem;font-size:.86rem;font-weight:800;
      cursor:pointer;transition:border-color .2s,background .2s;
    }
    .rating-photo-btn:hover{border-color:var(--green);background:#FEF3C7}
    .rating-photo-btn svg{width:17px;height:17px}
    .rating-photo-preview{
      display:none;align-items:center;gap:.55rem;background:#F8FAFC;
      border:1px solid #E5E7EB;border-radius:12px;padding:.35rem .45rem .35rem .35rem;
      max-width:100%;
    }
    .rating-photo-preview.show{display:flex}
    .rating-photo-preview img{
      width:46px;height:46px;border-radius:9px;object-fit:cover;background:#E5E7EB;
    }
    .rating-photo-name{font-size:.78rem;color:#475569;max-width:145px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rating-photo-remove{
      width:28px;height:28px;border:0;border-radius:999px;background:#E5E7EB;color:#334155;
      display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
    }
    .review-photo{
      display:block;width:100%;max-height:190px;object-fit:cover;border-radius:12px;
      margin-top:.65rem;border:1px solid #E5E7EB;background:#F8FAFC;
    }

    .btn-rate{
      width:100%;background:var(--green);color:#fff;
      border:none;border-radius:10px;padding:.9rem;
      font-size:.95rem;font-weight:700;cursor:pointer;
      margin-top:.75rem;transition:background .2s;
    }
    .btn-rate:hover{background:var(--green-deep)}
    .btn-rate:disabled{opacity:.5;cursor:not-allowed}

    /* Auth CTA */
    .rating-auth{
      background:var(--green-light,#DCFCE7);
      border-radius:var(--radius);padding:1.25rem;
      text-align:center;margin-bottom:1rem;
    }
    .rating-auth p{font-size:.88rem;color:var(--green-deep);margin-bottom:.75rem;line-height:1.55}
    .btn-auth{
      display:inline-block;background:var(--green);color:#fff;
      font-weight:700;font-size:.88rem;padding:.65rem 1.35rem;
      border-radius:10px;text-decoration:none;
    }

    /* Rating result / toast */
    .rating-toast{
      position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);
      background:var(--green-deep);color:#fff;
      font-size:.9rem;font-weight:600;
      padding:.75rem 1.5rem;border-radius:12px;
      box-shadow:0 4px 20px rgba(0,0,0,.25);
      opacity:0;pointer-events:none;
      transition:opacity .3s;z-index:9999;
      white-space:nowrap;
    }
    .rating-toast.show{opacity:1}

    /* LOADING */
    .loading{text-align:center;padding:4rem 1rem;color:var(--gray)}

    /* CHIP TIPO */
    .not-found{
      text-align:center;padding:4rem 1.25rem;
    }
    .not-found h2{font-size:1.5rem;margin-bottom:.5rem}

    /* Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,900&family=DM+Sans:wght@400;500;700&display=swap');
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/" class="back-btn">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
      Volver
    </a>
    <a href="/" class="logo-sm">Gluten<span>Go</span></a>
  </header>

  <div id="app">
    <div class="loading">Cargando…</div>
  </div>

  <script src="/data.js?v=2.8"></script>
  <script src="/auth.js?v=2.1"></script>
  <script src="/business-cta.js?v=2.2"></script>
  <script>
  (async function(){
    function escapeHtml(value) {
      return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[ch];
      });
    }

    function hasDirectContact(lugar) {
      const plan = String((lugar && lugar.plan) || 'basico').toLowerCase();
      return plan === 'verificado' || plan === 'certificado';
    }

    const CATEGORY_LABELS = {
      restaurante: 'Restaurante',
      cafeteria: 'Cafetería',
      panaderia: 'Panadería',
      heladeria: 'Heladería',
      rotiseria: 'Para llevar',
      almacen: 'Almacén',
      hotel: 'Hotel',
      otro: 'Otro',
    };

    const CATEGORY_SVG = {
      restaurante:
        '<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">' +
          '<path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 002-2V2"/>' +
          '<path d="M7 2v20M21 15V2a5 5 0 00-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>' +
        '</svg>',
      cafeteria:
        '<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">' +
          '<path d="M18 8h1a4 4 0 010 8h-1"/>' +
          '<path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/>' +
          '<line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>' +
        '</svg>',
      panaderia:
        '<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">' +
          '<path d="M17 8C17 11 13 13 12 14C11 13 7 11 7 8a5 5 0 0110 0z"/>' +
          '<path d="M9 14v7h6v-7"/>' +
          '<line x1="9" y1="17.5" x2="15" y2="17.5"/>' +
        '</svg>',
      heladeria:
        '<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">' +
          '<circle cx="12" cy="9" r="5"/>' +
          '<path d="M9.5 14l2.5 7 2.5-7"/>' +
        '</svg>',
      rotiseria:
        '<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">' +
          '<path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/>' +
        '</svg>',
      hotel:
        '<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">' +
          '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>' +
          '<polyline points="9 22 9 12 15 12 15 22"/>' +
        '</svg>',
      almacen:
        '<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">' +
          '<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>' +
          '<line x1="3" y1="6" x2="21" y2="6"/>' +
          '<path d="M16 10a4 4 0 01-8 0"/>' +
        '</svg>',
      otro:
        '<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">' +
          '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>' +
          '<circle cx="12" cy="10" r="3"/>' +
        '</svg>',
    };

    function formatCategory(category) {
      return CATEGORY_LABELS[category] || category || 'Otro';
    }

    function categoryIcon(category) {
      return '<span class="lugar-category-icon" aria-hidden="true">' + (CATEGORY_SVG[category] || CATEGORY_SVG.otro) + '</span>';
    }

    function parseCoord(value) {
      var raw = String(value == null ? '' : value).trim();
      if (!raw) return null;
      var n = Number(raw.replace(',', '.'));
      return Number.isFinite(n) ? n : null;
    }

    function hasValidCoords(lugar) {
      return lugar &&
        parseCoord(lugar.lat) !== null &&
        parseCoord(lugar.lng) !== null;
    }

    function normalizePublicPlace(place) {
      if (!place || !place.slug || !place.name) return null;
      var lat = parseCoord(place.lat);
      var lng = parseCoord(place.lng);
      return {
        slug: String(place.slug),
        name: String(place.name),
        category: CATEGORY_LABELS[place.category] ? place.category : 'otro',
        tipo: place.tipo === 'exclusivo' ? 'exclusivo' : 'mixto',
        address: place.address || 'Dirección a confirmar',
        neighborhood: place.neighborhood || 'Zona a confirmar',
        phone: place.phone || '',
        desc: place.desc || 'Local registrado en GlutenGo. Confirmá información antes de ir.',
        hours: place.hours || null,
        lat: lat,
        lng: lng,
        instagram: place.instagram || '',
        plan: place.plan || 'basico',
        logoUrl: place.logoUrl || '',
        photoUrls: Array.isArray(place.photoUrls) ? place.photoUrls : [],
        featuredPlacement: place.featuredPlacement || 'none',
        benefits: place.benefits || {},
        source: place.source || 'admin',
      };
    }

    async function findPublicLugar(slug) {
      try {
        const res = await fetch('/api/public-businesses');
        if (!res.ok) return null;
        const list = await res.json();
        const found = Array.isArray(list) ? list.find(function(item) { return item.slug === slug; }) : null;
        return normalizePublicPlace(found);
      } catch (err) {
        return null;
      }
    }

    // ── Leer slug de la URL
    const params = new URLSearchParams(location.search);
    const slug   = params.get('slug');
    const lugar  = slug ? (lugares.find(l => l.slug === slug) || await findPublicLugar(slug)) : null;

    const app = document.getElementById('app');

    if (!lugar) {
      app.innerHTML = `
        <div class="not-found">
          <div style="width:58px;height:58px;border-radius:18px;background:#F3F4F6;color:#6B7280;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
            <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/><path d="M8.5 9.5h.01M13.5 9.5h.01"/><path d="M8.8 13.8c1.5 1.1 3 1.1 4.4 0"/></svg>
          </div>
          <h2>Lugar no encontrado</h2>
          <p style="color:#6B7280;margin-bottom:1.5rem">El slug "<strong>${slug||''}</strong>" no existe en nuestra guía.</p>
          <a href="/" style="display:inline-block;background:var(--green);color:#fff;padding:.75rem 1.5rem;border-radius:12px;text-decoration:none;font-weight:700">Ver todos los lugares</a>
        </div>`;
      return;
    }

    // ── Actualizar meta
    document.getElementById('page-title').textContent = lugar.name + ' — GlutenGo';
    document.getElementById('page-desc').content =
      lugar.desc.slice(0,155) + '…';

    // ── Puntaje (se carga dinámicamente desde /api/rating)
    const r = 30; const circ = 2*Math.PI*r;

    function scoreInfo(scorePct) {
      return {
        scoreNum: scorePct !== null ? scorePct : '—',
        bandClass: scorePct === null ? 'band-construcion'
          : scorePct >= 95 ? 'band-come-tranquilo'
          : scorePct >= 80 ? 'band-muy-recomendado'
          : scorePct >= 60 ? 'band-consulta-antes'
          : 'band-requiere-validacion',
        bandLabel: scorePct === null ? 'Aún sin puntaje'
          : scorePct >= 95 ? 'Excelente'
          : scorePct >= 80 ? 'Muy bueno'
          : scorePct >= 60 ? 'Confirmar antes'
          : 'En revisión',
        dash: scorePct !== null ? circ * (1 - scorePct/100) : circ,
        ringColor: scorePct === null ? '#d1d5db'
          : scorePct >= 80 ? '#166534'
          : scorePct >= 60 ? '#D97706'
          : '#EF4444',
      };
    }

    // Iniciar con null mientras carga
    var currentScore = null;
    var si = scoreInfo(null);
    const hasCoords = hasValidCoords(lugar);
    const logoHtml = lugar.logoUrl

    function setPhotoPreview(payload) {
      var box = document.getElementById('rating-photo-preview');
      var img = document.getElementById('rating-photo-img');

      if (!box || !img || !name) return;
      if (!payload) {

        name.textContent = '';
        return;
      }
      img.src = payload.dataUrl;
      name.textContent = payload.name || 'Foto seleccionada';
      box.classList.add('show');
    }

    function resizeRatingPhoto(file) {
      return new Promise(function(resolve, reject) {
        if (!file || !/^image\//.test(file.type || '')) {
          reject(new Error('Elegí una imagen válida'));
          return;
        }
        if (file.size > 10 * 1024 * 1024) {
          reject(new Error('La foto es demasiado pesada'));
          return;
        }
        var reader = new FileReader();
        reader.onerror = function(){ reject(new Error('No se pudo leer la foto')); };
        reader.onload = function() {
          var img = new Image();
          img.onerror = function(){ reject(new Error('No se pudo procesar la foto')); };
          img.onload = function() {
            var maxSide = 1280;
            var width = img.width;
            var height = img.height;
            if (width > maxSide || height > maxSide) {
              var ratio = Math.min(maxSide / width, maxSide / height);
              width = Math.round(width * ratio);
              height = Math.round(height * ratio);
            }
            var canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve({
              dataUrl: canvas.toDataURL('image/jpeg', 0.82),
              type: 'image/jpeg',
              name: file.name || 'foto.jpg',
            });
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    window.handleRatingPhotoChange = function(event) {
      var input = event && event.target;
      var file = input && input.files && input.files[0];
      if (!file) return;
      showToast('Preparando foto…');
      resizeRatingPhoto(file).then(function(payload) {
        ratingPhotoPayload = payload;
        setPhotoPreview(payload);
        showToast('Foto lista para enviar');
      }).catch(function(err) {
        ratingPhotoPayload = null;
        setPhotoPreview(null);
        if (input) input.value = '';
        showToast(err.message || 'No se pudo preparar la foto', true);
      });
    };

    window.clearRatingPhoto = function() {
      ratingPhotoPayload = null;
      var input = document.getElementById('rating-photo');
      if (input) input.value = '';
      setPhotoPreview(null);
    };

    // ── Enviar valoración
    window.submitRating = function() {
      if (!selectedStars) { showToast('Elegí una estrella primero', true); return; }
      var btn = document.getElementById('btn-send-rating');
      if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }

      window.GlutenAuth.getSession().then(function(session) {
        var token = session ? session.access_token : null;
        if (!token) {
          showToast('Iniciá sesión primero', true);
          if (btn) { btn.disabled = false; btn.textContent = 'Enviar valoración'; }
          return;
        }
        var comentario = (document.getElementById('rating-comment')||{}).value || '';
        var body = { token: token, slug: slug, score: selectedStars, comentario: comentario };
        if (ratingPhotoPayload) body.photo = ratingPhotoPayload;

        fetch('/api/rating', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
        .then(function(res){ return res.json(); })
        .then(function(data){
          if (data.ok) {
            var okMessage = data.photoStatus === 'pending'
              ? '¡Gracias! Tu valoración fue guardada. La foto queda en revisión.'
              : '¡Gracias! Tu valoración fue guardada';
            showToast(data.photoWarning || okMessage, Boolean(data.photoWarning));
            updateScoreUI(data.score, data.count);
            var sec = document.getElementById('rating-section');
            if (sec) {
              sec.innerHTML = '<div style="background:var(--green-light);border-radius:var(--radius);padding:1rem 1.25rem;text-align:center;margin-bottom:1rem;font-weight:700;color:var(--green-deep)">¡Gracias por valorar este lugar! Tu voto ya está contado.</div>';
            }
            // Refrescar reseñas
            fetch('/api/rating?slug=' + encodeURIComponent(slug))
              .then(function(r){ return r.json(); })
              .then(function(d){ renderComunidad(d.recent); });
          } else {
            throw new Error(data.error || 'error');
          }
        })
        .catch(function(){
          if (btn) { btn.disabled = false; btn.textContent = 'Enviar valoración'; }
          showToast('No se pudo guardar la valoración. Intentá de nuevo.', true);
        });
      });
    };

    // ── Render sección de valoración (según si hay sesión)
    function renderRatingSection() {
      var section = document.getElementById('rating-section');
      if (!section) return;
      section.innerHTML = '<div style="height:60px"></div>';

      window.GlutenAuth.getSession().then(function(session) {
        var user = session ? session.user : null;
        if (!section) return;
        if (user) {
          section.innerHTML =
            '<div class="rating-panel">' +
              '<h2><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>Valorar este lugar</h2>' +
              '<div class="star-group" id="stars-row"></div>' +
              '<div class="star-label" id="star-label">Tocá una estrella para calificar</div>' +
              '<textarea class="rating-comment" id="rating-comment" placeholder="¿Cómo fue tu experiencia? (opcional)" maxlength="400"></textarea>' +
              '<div class="rating-photo-row">' +
                '<input class="rating-photo-input" id="rating-photo" type="file" accept="image/*" capture="environment" onchange="handleRatingPhotoChange(event)">' +
                '<label class="rating-photo-btn" for="rating-photo">' +
                  '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 7h3l2-3h6l2 3h3a2 2 0 012 2v9a2 2 0 01-2 2H4a2 2 0 01-2-2V9a2 2 0 012-2z"/><circle cx="12" cy="13" r="4"/></svg>' +
                  'Agregar foto' +
                '</label>' +
                '<div class="rating-photo-preview" id="rating-photo-preview">' +
                  '<img id="rating-photo-img" alt="Foto seleccionada">' +
                  '<span class="rating-photo-name" id="rating-photo-name"></span>' +
                  '<button type="button" class="rating-photo-remove" onclick="clearRatingPhoto()" aria-label="Quitar foto">×</button>' +
                '</div>' +
              '</div>' +
              '<button class="btn-rate" id="btn-send-rating" onclick="submitRating()">Enviar valoración</button>' +
            '</div>';
          renderStars();
        } else {
          section.innerHTML =
            '<div class="rating-auth">' +
              '<p>Iniciá sesión con Google para valorar este lugar y ayudar a otros celíacos a comer seguros</p>' +
              '<button class="btn-auth" onclick="GlutenAuth.signInWithGoogle()" style="border:none;cursor:pointer">Continuar con Google →</button>' +
            '</div>';
        }
      }).catch(function(){ if (section) section.innerHTML = ''; });
    }

    renderRatingSection();
    window.onGlutenAuthSignIn = renderRatingSection;

  })();

  // ── Service Worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  }
  </script>
</body>
</html>
